<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reportar situación</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --azul:    #11243a;
      --azul2:   #1a3a5c;
      --azul3:   #0669a3;
      --celeste: #3bd8ff;
      --lila:    #A561AB;
      --gris:    #D9D9D9;
      --blanco:  #ffffff;
      --off:     #f5f7fa;
    }
    
    body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--azul);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.report-container {
  flex: 1;
}
 /* ═══════════════════════════════
       NAVBAR
    ═══════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      height: 76px;
      background: rgba(21,44,71,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; }

    /* ── LOGO NAVBAR GRANDE ── */
    .nav-logo img {
      height: 65px;
      width: auto;
      max-width: 230px;
      border-radius: 4px;
      object-fit: contain;
    }
    .nav-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); }
    .nav-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 400;
      color: var(--celeste); letter-spacing: 0.5px;
    }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a {
      font-size: 14px; font-weight: 400;
      color: rgba(255, 255, 255, 0.733);
      text-decoration: none; letter-spacing: 0.3px;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--blanco); }
    .nav-cta {
      background: var(--lila);
      color: var(--azul) !important;
      font-weight: 500 !important;
      padding: 8px 20px; border-radius: 6px;
      transition: opacity .2s !important;
    }
    .nav-cta:hover { opacity: .88; }
 /* ═══════════════════════════════
       FOOTER DYNAMIC
    ═══════════════════════════════ */
    .footer { background: var(--azul) !important; padding: 0 !important; }

    .footer-cta {
      background: linear-gradient(135deg, rgba(165,97,171,.85), rgba(165,97,171,.7)) !important;
      border: none !important; margin: 0 !important;
      padding: 40px 48px !important;
      display: flex !important; justify-content: space-between !important;
      align-items: center !important; gap: 40px !important;
    }
    .footer-cta .cta-text { flex: 1; }
    .footer-cta .cta-text h3 { color: var(--blanco) !important; font-size: 22px !important; margin-bottom: 8px !important; letter-spacing: -0.2px !important; }
    .footer-cta .cta-text p { color: rgba(255,255,255,.85) !important; font-size: 14px !important; }
    .cta-button {
      background: var(--blanco) !important; color: var(--lila) !important;
      font-weight: 700 !important; padding: 12px 24px !important;
      border-radius: 6px !important; white-space: nowrap !important; flex-shrink: 0 !important;
    }
    .cta-button:hover { background: rgba(255,255,255,.9) !important; }

    .footer-contact { background: rgba(21,189,230,.08) !important; padding: 28px 48px !important; border-bottom: 1px solid rgba(21,189,230,.15) !important; }
    .contact-title { color: rgba(255,255,255,.5) !important; font-size: 10px !important; font-weight: 700 !important; letter-spacing: 1.5px !important; text-transform: uppercase !important; margin-bottom: 20px !important; }
    .contact-grid { display: grid !important; grid-template-columns: repeat(4,1fr) !important; gap: 24px !important; max-width: 1100px !important; margin: 0 auto !important; }
    .contact-item { display: flex !important; gap: 12px !important; align-items: flex-start !important; }
    .contact-icon { font-size: 24px !important; flex-shrink: 0 !important; }
    .contact-item strong { color: var(--blanco) !important; font-size: 13px !important; display: block !important; }
    .contact-item p { color: rgba(255,255,255,.6) !important; font-size: 11px !important; margin-top: 2px !important; }

    .footer-main {
      max-width: 1100px !important; margin: 0 auto !important;
      display: grid !important; grid-template-columns: 2fr 1fr 1fr 1fr !important;
      gap: 48px !important; padding: 48px !important;
      border-bottom: 1px solid rgba(255,255,255,.08) !important;
    }
    .footer-brand { display: flex !important; flex-direction: column !important; gap: 12px !important; }

   /* ── LOGO FOOTER GRANDE — sin filter que lo oculte ── */
    .footer-brand img,
    .footer-logo {
      width: 200px !important;
      height: auto !important;
      max-height: 72px !important;
      border-radius: 6px !important;
      object-fit: contain !important;
      filter: none !important;
    }

    .brand-tagline { color: var(--celeste) !important; font-size: 12px !important; font-weight: 500 !important; }
    .brand-desc { color: rgba(255,255,255,.6) !important; font-size: 12px !important; line-height: 1.6 !important; margin: 8px 0 !important; }
    .social-links { display: flex !important; gap: 8px !important; margin-top: 8px !important; }
    .social-links a {
      width: 28px !important; height: 28px !important; border-radius: 6px !important;
      background: rgba(255,255,255,.08) !important; color: rgba(255,255,255,.5) !important;
      display: flex !important; align-items: center !important; justify-content: center !important;
      font-size: 11px !important; font-weight: 600 !important;
      text-decoration: none !important; transition: all .2s !important;
    }
    .social-links a:hover { background: var(--celeste) !important; color: var(--azul) !important; }
    .verified-badge {
      background: rgba(21,189,230,.15) !important; border: 1px solid rgba(21,189,230,.3) !important;
      border-radius: 6px !important; padding: 8px 12px !important;
      color: var(--celeste) !important; font-size: 10px !important; line-height: 1.5 !important; margin-top: 8px !important;
    }

    .footer-links { display: flex !important; flex-direction: column !important; gap: 8px !important; }
    .footer-links h4 { color: var(--blanco) !important; font-size: 13px !important; font-weight: 600 !important; margin-bottom: 12px !important; }
    .footer-links a {
      color: rgba(255,255,255,.55) !important; font-size: 12px !important;
      text-decoration: none !important; transition: color .2s !important;
      display: inline-flex !important; gap: 6px !important; align-items: center !important;
    }
    .footer-links a:hover { color: var(--celeste) !important; }
    .badge { background: rgba(165,97,171,.2) !important; color: var(--lila) !important; font-size: 9px !important; padding: 2px 6px !important; border-radius: 4px !important; font-weight: 600 !important; }

    .footer-conf {
      background: rgba(165,97,171,.12) !important;
      border-top: 1px solid rgba(165,97,171,.2) !important; border-bottom: 1px solid rgba(165,97,171,.2) !important;
      color: rgba(255,255,255,.85) !important; padding: 24px 48px !important;
      display: flex !important; gap: 16px !important; align-items: flex-start !important;
    }
    .conf-icon { font-size: 20px !important; flex-shrink: 0 !important; }
    .conf-text strong { display: block !important; color: var(--blanco) !important; margin-bottom: 4px !important; font-size: 13px !important; }
    .conf-text p { font-size: 12px !important; line-height: 1.6 !important; }

    .footer-bottom {
      background: rgba(0,0,0,.2) !important; padding: 16px 48px !important;
      max-width: 100% !important; margin: 0 auto !important;
      display: flex !important; justify-content: space-between !important;
      align-items: center !important; flex-wrap: wrap !important; gap: 16px !important;
    }
    .footer-copy { color: rgba(255,255,255,.4) !important; font-size: 11px !important; }
    .footer-links-bottom { display: flex !important; gap: 16px !important; flex-wrap: wrap !important; }
    .footer-links-bottom a { color: rgba(255,255,255,.35) !important; font-size: 11px !important; text-decoration: none !important; transition: color .2s !important; }
    .footer-links-bottom a:hover { color: var(--celeste) !important; }


    /* CONTENEDOR */
    .report-container {
      max-width: 650px;
      margin: 120px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,.2);
      animation: fadeUp .6s ease;
    }

    h1 {
      font-family: 'Syne';
      font-size: 26px;
    }

    .sub {
      font-size: 13px;
      color: #6b7a8c;
      margin-bottom: 20px;
    }

    .tip {
      background: rgba(59,216,255,.1);
      border-left: 4px solid var(--celeste);
      padding: 10px;
      border-radius: 8px;
      font-size: 12.5px;
      margin-bottom: 20px;
    }

    .group {
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    select, input[type="text"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--gris);
    }

    .checks label {
      display: flex;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .otro-input {
      display: none;
      margin-top: 6px;
      animation: fadeUp .3s ease;
    }

    .btn {
      width: 100%;
      background: var(--lila);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    /* LOADING */
    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
      animation: fadeUp .4s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top: 4px solid var(--lila);
      border-radius: 50%;
      margin: auto;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 10px;
      font-size: 13px;
      color: #6b7a8c;
      animation: pulse 1.5s infinite;
    }

    /* RESULTADO */
    .resultado {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: var(--off);
      animation: fadeUp .5s ease;
    }

    .resultado h3 {
      color: #0a1f33;
    }

    .cta {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      background: var(--azul);
      color: white;
      border-radius: 999px;
      text-decoration: none;
    }

    /* ANIMACIONES */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%,100% { opacity: .4; }
      50% { opacity: 1; }
    }
  </style>
  
</head>

<body>
    <!-- NAVBAR DINÁMICO -->
<div id="navbar-container"></div>

<div class="report-container">

  <h1>Reportar una situación</h1>
  <p class="sub">Identifica si estás frente a acoso, discriminación o una situación ambigua.</p>

  <div class="tip">
    Recuerda que puedes hablar con tu líder de equipo antes de realizar un reporte formal.
  </div>

  <div class="group">
    <label>¿Quién realizó la acción?</label>
    <select id="quien" required>
      <option value="">Selecciona</option>
      <option value="jefe">Superior</option>
      <option value="compañero">Compañero/a</option>
      <option value="cliente">Cliente o externo</option>
    </select>
  </div>

  <div class="group checks">
    <label>¿Qué ocurrió?</label>

    <label><input type="checkbox" value="acoso"> Comentarios ofensivos o humillantes</label>
    <label><input type="checkbox" value="discriminacion"> Trato desigual por género, edad u otra condición</label>
    <label><input type="checkbox" value="exclusion"> Exclusión intencional</label>
    <label><input type="checkbox" value="otro" onchange="toggleOtro()"> Otro</label>

    <input type="text" id="otroTexto" class="otro-input" placeholder="Describe brevemente...">
  </div>

  <div class="group">
    <label>¿Con qué frecuencia ocurre?</label>
    <select id="frecuencia" required>
      <option value="">Selecciona</option>
      <option value="una">Una vez</option>
      <option value="ocasional">Ocasionalmente</option>
      <option value="repetido">Frecuente</option>
    </select>
  </div>

  <div class="group">
    <label>¿Cómo te afecta?</label>
    <select id="impacto" required>
      <option value="">Selecciona</option>
      <option value="leve">Molestia leve</option>
      <option value="estres">Estrés o incomodidad</option>
      <option value="grave">Impacto emocional fuerte</option>
    </select>
  </div>

  <button class="btn" onclick="evaluar()">Analizar situación</button>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Analizando tu situación...</div>
  </div>

  <div id="resultado" class="resultado"></div>

</div>

<script>
function toggleOtro() {
  const check = event.target.checked;
  document.getElementById("otroTexto").style.display = check ? "block" : "none";
}

function evaluar() {
  const quien = document.getElementById("quien").value;
  const frecuencia = document.getElementById("frecuencia").value;
  const impacto = document.getElementById("impacto").value;
  const checks = document.querySelectorAll('input[type="checkbox"]:checked');

  if (!quien || !frecuencia || !impacto || checks.length === 0) {
    alert("Completa todas las preguntas antes de continuar.");
    return;
  }

  const loading = document.getElementById("loading");
  const resultado = document.getElementById("resultado");

  resultado.style.display = "none";
  loading.style.display = "block";

  setTimeout(() => {
    loading.style.display = "none";

    const valores = Array.from(checks).map(c => c.value);

    let tipo = "";
    let mensaje = "";

    if (valores.includes("acoso")) {
      tipo = "Caso de acoso laboral";
      mensaje = "Se identifican conductas que pueden constituir acoso.";
    }
    else if (valores.includes("discriminacion")) {
      tipo = "Posible discriminación laboral";
      mensaje = "Podría existir trato desigual no justificado.";
    }
    else if (valores.includes("exclusion")) {
      tipo = "Clima laboral hostil";
      mensaje = "Se detecta una posible exclusión sistemática.";
    }
    else {
      tipo = "Situación ambigua o en evaluación";
      mensaje = "Se requiere mayor análisis del contexto.";
    }

    resultado.style.display = "block";
    resultado.innerHTML = `
      <h3>${tipo}</h3>
      <p>${mensaje}</p>
      <a href="https://secure.ethicspoint.eu/domain/media/en/gui/104822/index.html" class="cta">Ir a Inchcape</a>
    `;
  }, 1800);
}
</script>
<!-- FOOTER DINÁMICO -->
<div id="footer-container"></div>

<script>
  // NAVBAR
  fetch('../components/navbar.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('navbar-container').innerHTML = html;

      const nav = document.querySelector('nav');
      if (nav) {
        window.addEventListener('scroll', () => {
          nav.style.background = window.scrollY > 40
            ? 'rgba(21,44,71,0.99)'
            : 'rgba(21,44,71,0.95)';
          nav.style.boxShadow = window.scrollY > 40
            ? '0 2px 24px rgba(0,0,0,.25)'
            : 'none';
        });
      }
    });

  // FOOTER
  fetch('../components/footer.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('footer-container').innerHTML = html;

      // Fix logo (igual que en index)
      const footerImgs = document.querySelectorAll('.footer-brand img, .footer-logo');
      footerImgs.forEach(img => {
        img.style.filter = 'none';
        img.style.width = '200px';
        img.style.height = 'auto';
      });
    });
</script>
</body>
</html>
